<div class="header d-flex align-items-center px-3 ">
    <a href="javascript:void(0)" (click)="goBack()" class="back me-3"><i class='bx bx-left-arrow-alt  fs-3 '></i></a>
    <!-- <h5>Bookmarks</h5> -->
    <div>
        <h5 class="mb-0">Bookmarks</h5>
        <small class="m-0 text-muted">&#64;{{ user?.userName }}</small>
    </div>
    <div *ngIf="tweets?.length" class="ms-auto">
        <a href="javascript:void(0)" class="text-reset fs-5 bookmark-btn" title="Clear Bookmarks" (click)="openClearBookmarksModal(clearBookmarksModal)">
            <i class='bx bx-brush-alt' ></i>
        </a>
    </div>
</div>
<div class="bookmark ">
    <ul class="list-group d-flex justify-content-center" *ngIf="tweets?.length">
        <li class="list-group-item d-flex justify-content-center p-0" *ngFor="let tweet of tweets"><app-card
                (likeEvent)="ngOnInit()" [tweet]="tweet" (bookmarkTrigger)="getBookmarks()" (deleteTrigger)="getBookmarks()"></app-card></li>
        <div class="twitter-spinner mx-auto my-4" *ngIf="isLoading"></div>
    </ul>
    <div class="no-data text-center" *ngIf="!isLoading && !tweets?.length">
        <i class='bx bx-unlink fs-1 mb-3'></i>
        <h2>Save Tweets for later</h2>
        <p>Don't let the good ones fly away! Bookmark Tweets to <br> easily find them again in the future.</p>
    </div>
</div>

<ng-template #clearBookmarksModal let-modal>
  <div class="modal-body p-4">
    <div class="text-center"><i class="bx bxl-twitter text-center fs-1 mb-3"></i></div>
    <h3>Clear Bookmarks?</h3>
    <p>This can’t be undone and all Tweets will be removed from your Bookmarks.</p>
    <div class="d-flex flex-column">
      <button class="btn btn-danger mb-2" (click)="confirmClearBookmarks()">Clear</button>
      <button class="btn btn-outline-dark" (click)="modal.dismiss()">Cancel</button>
    </div>
  </div>
</ng-template>
