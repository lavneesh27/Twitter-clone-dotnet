<div class="header d-flex align-items-center px-3 ">
  <h5>Login</h5>
</div>
<div class="login p-3">
  <form class="auth-form" (submit)="login()">
    <div class="mb-3">
      <label for="email" class="form-label">Email address</label>
      <input type="email" class="form-control" id="email" name="email"  [(ngModel)]="email"/>
    </div>
    <div class="mb-3">
      <label for="pwd" class="form-label">Password</label>
      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control"
          id="pwd"
          name="password"
          [(ngModel)]="password"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          [title]="showPassword ? 'Hide password' : 'Show password'"
        >
          <i [class]="showPassword ? 'bx bx-hide fs-5' : 'bx bx-show fs-5'"></i>
        </button>
      </div>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="rem" name="remember"  [(ngModel)]="remember">  
      <label class="form-check-label" for="exampleCheck1">Remember Me</label>
    </div>
    <div class="mb-3">
      <p for="pwd" class="form-label">Forgot Password? <a href="javascript:void(0)" style="cursor: not-allowed">click here</a></p>
    </div>


    <button type="submit" class="d-block mx-auto btn" [disabled]="isLoading">
      <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" *ngIf="isLoading"></span>
      <span>{{ isLoading ? 'Logging in...' : 'Login' }}</span>
    </button>
  </form>
</div>
